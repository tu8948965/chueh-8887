name: Run Line Bot

on:
  repository_dispatch:
    types: [wake_up_bot]

jobs:
  run_bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests yfinance

    - name: Run script
      run: |
        python 股票+line機器人/send_line.py
